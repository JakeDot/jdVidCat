name: Request AI Code Review
description: >
  Request a code review from an AI reviewer bot via the GitHub reviewers API.
  Skips gracefully if the reviewer is already assigned or the request fails.

inputs:
  reviewer-login:
    description: 'GitHub login of the AI reviewer bot (e.g. "gemini-code-assist")'
    required: true
  github-token:
    description: 'GitHub token with pull-requests:write permission.'
    required: false
    default: ${{ github.token }}

runs:
  using: composite
  steps:
    - name: Request reviewer via API
      uses: actions/github-script@v7
      env:
        REVIEWER_LOGIN: ${{ inputs.reviewer-login }}
      with:
        github-token: ${{ inputs.github-token }}
        script: |
          const reviewerLogin = process.env.REVIEWER_LOGIN;

          if (!reviewerLogin) {
            throw new Error('REVIEWER_LOGIN env var must not be empty');
          }

          try {
            await github.rest.pulls.requestReviewers({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              reviewers: [reviewerLogin],
            });
            core.info(`Requested review from ${reviewerLogin} via API.`);
          } catch (err) {
            core.warning(`API review request for ${reviewerLogin} failed: ${err.message}`);
          }
