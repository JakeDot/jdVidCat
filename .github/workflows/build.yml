name: Build Extension

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate extension files exist
        run: |
          test -f manifest.json
          test -f background.js
          test -f content.js
          test -f popup.html
          test -f popup.js
          test -f icons/jdcatvid.svg

      - name: Lint manifest JSON
        run: jq . manifest.json > /dev/null

      - name: Validate JavaScript syntax
        run: |
          node --check background.js
          node --check content.js
          node --check popup.js

      - name: Build extension artifacts
        run: |
          mkdir -p dist
          # Create base ZIP (generic)
          zip -r dist/jdCatVid.zip manifest.json background.js content.js popup.html popup.js icons
          # Create XPI for Firefox (same content, different extension)
          cp dist/jdCatVid.zip dist/jdCatVid.xpi
          # Create Chrome extension (same content)
          cp dist/jdCatVid.zip dist/jdCatVid-chrome.zip

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: jdCatVid-zip
          path: dist/jdCatVid.zip

      - name: Upload XPI artifact
        uses: actions/upload-artifact@v4
        with:
          name: jdCatVid-xpi
          path: dist/jdCatVid.xpi

      - name: Upload Chrome artifact
        uses: actions/upload-artifact@v4
        with:
          name: jdCatVid-chrome
          path: dist/jdCatVid-chrome.zip

  gemini-code-assist:
    runs-on: ubuntu-latest
    if: ${{ secrets.GEMINI_API_KEY != '' }}
    continue-on-error: true
    strategy:
      matrix:
        model: [gemini-2.5-pro, gemini-2.5-flash, gemini-2.0-flash]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Gemini Code Assist (${{ matrix.model }})
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ matrix.model }}
        run: |
          npx -y @google/gemini-cli \
            --model "$GEMINI_MODEL" \
            --prompt "Review this repository for build and extension issues."
