name: Build & Package Extension

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  release:
    types: [published]

permissions:
  contents: read

jobs:
  validate-and-package:
    name: Validate and Package Extension (ZIP/XPI/Chrome)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate manifest.json
        run: |
          echo "Checking manifest.json exists..."
          test -f manifest.json || { echo "manifest.json not found"; exit 1; }

          echo "Validating manifest.json is valid JSON..."
          python3 -c "
          import json, sys
          with open('manifest.json') as f:
              manifest = json.load(f)
          required = ['manifest_version', 'name', 'version', 'background']
          for field in required:
              if field not in manifest:
                  print(f'Missing required field: {field}', file=sys.stderr)
                  sys.exit(1)
          if manifest['manifest_version'] != 3:
              print('manifest_version must be 3', file=sys.stderr)
              sys.exit(1)
          print('manifest.json is valid')
          print(f'  Name: {manifest[\"name\"]}')
          print(f'  Version: {manifest[\"version\"]}')
          print(f'  Manifest version: {manifest[\"manifest_version\"]}')
          "

      - name: Validate required extension files
        run: |
          echo "Checking required files..."
          for file in background.js popup.html popup.js; do
            test -f "$file" || { echo "Required file missing: $file"; exit 1; }
            echo "  Found: $file"
          done

      - name: Validate icon files
        run: |
          echo "Checking icon files..."
          for size in 16 48 128; do
            test -f "icons/icon${size}.png" || { echo "Missing icon: icons/icon${size}.png"; exit 1; }
            echo "  Found: icons/icon${size}.png"
          done

      - name: Validate JavaScript syntax
        run: |
          echo "Checking JavaScript syntax..."
          node --check background.js && echo "  background.js OK"
          node --check popup.js     && echo "  popup.js OK"

      - name: Package all extension formats
        run: |
          echo "Packaging extensions in multiple formats..."
          # Define files to include in all packages
          FILES="manifest.json background.js popup.html popup.js icons/"

          # Create generic ZIP (build once)
          echo "Creating generic ZIP..."
          zip -q -r jdVidCat.zip ${FILES}
          test -f jdVidCat.zip || { echo "✗ Failed to create jdVidCat.zip"; exit 1; }
          echo "✓ jdVidCat.zip created successfully"

          # Create Firefox XPI (copy and rename - XPI is just a ZIP with .xpi extension)
          # Note: The actual Firefox build with gecko ID happens in the publish-firefox-amo job
          echo "Creating Firefox XPI..."
          cp jdVidCat.zip jdVidCat.xpi
          test -f jdVidCat.xpi || { echo "✗ Failed to create jdVidCat.xpi"; exit 1; }
          echo "✓ jdVidCat.xpi created successfully"

          # Create Chrome extension ZIP (copy and rename for clarity)
          echo "Creating Chrome extension ZIP..."
          cp jdVidCat.zip jdVidCat-chrome.zip
          test -f jdVidCat-chrome.zip || { echo "✗ Failed to create jdVidCat-chrome.zip"; exit 1; }
          echo "✓ jdVidCat-chrome.zip created successfully"

          echo ""
          echo "All packages created. Summary:"
          ls -lh jdVidCat.zip jdVidCat.xpi jdVidCat-chrome.zip

      - name: Upload Generic ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: jdVidCat-generic
          path: jdVidCat.zip
          retention-days: 30

      - name: Upload Firefox XPI artifact
        uses: actions/upload-artifact@v4
        with:
          name: jdVidCat-firefox
          path: jdVidCat.xpi
          retention-days: 30

      - name: Upload Chrome Extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: jdVidCat-chrome
          path: jdVidCat-chrome.zip
          retention-days: 30

  publish-chrome-web-store:
    name: Publish Chrome Extension
    runs-on: ubuntu-latest
    needs: validate-and-package
    if: github.event_name == 'release'
    steps:
      - name: Check Chrome publishing secrets
        id: check_chrome_secrets
        env:
          CHROME_CLIENT_ID: ${{ secrets.CHROME_CLIENT_ID }}
          CHROME_CLIENT_SECRET: ${{ secrets.CHROME_CLIENT_SECRET }}
          CHROME_REFRESH_TOKEN: ${{ secrets.CHROME_REFRESH_TOKEN }}
          CHROME_EXTENSION_ID: ${{ secrets.CHROME_EXTENSION_ID }}
        run: |
          if [ -n "${CHROME_CLIENT_ID}" ] && [ -n "${CHROME_CLIENT_SECRET}" ] && [ -n "${CHROME_REFRESH_TOKEN}" ] && [ -n "${CHROME_EXTENSION_ID}" ]; then
            echo "publish_enabled=true" >> "${GITHUB_OUTPUT}"
          else
            echo "publish_enabled=false" >> "${GITHUB_OUTPUT}"
            echo "::warning::Chrome Web Store publishing skipped: one or more required secrets (CHROME_CLIENT_ID, CHROME_CLIENT_SECRET, CHROME_REFRESH_TOKEN, CHROME_EXTENSION_ID) are missing or empty."
          fi

      - name: Download Chrome extension artifact
        if: steps.check_chrome_secrets.outputs.publish_enabled == 'true'
        uses: actions/download-artifact@v4
        with:
          name: jdVidCat-chrome
          path: dist

      - name: Upload and publish to Chrome Web Store
        if: steps.check_chrome_secrets.outputs.publish_enabled == 'true'
        # Pin to commit SHA for security (v2.0.5)
        uses: mobilefirstllc/cws-publish@058ab4c4b3c67541706a3f9fc974810427dce113
        with:
          action: publish
          extension_id: ${{ secrets.CHROME_EXTENSION_ID }}
          client_id: ${{ secrets.CHROME_CLIENT_ID }}
          client_secret: ${{ secrets.CHROME_CLIENT_SECRET }}
          refresh_token: ${{ secrets.CHROME_REFRESH_TOKEN }}
          zip_file: dist/jdVidCat-chrome.zip

  publish-firefox-amo:
    name: Publish Firefox Extension
    runs-on: ubuntu-latest
    needs: validate-and-package
    if: github.event_name == 'release'
    steps:
      - name: Check Firefox publishing secrets
        id: check_firefox_secrets
        env:
          FIREFOX_JWT_ISSUER: ${{ secrets.FIREFOX_JWT_ISSUER }}
          FIREFOX_JWT_SECRET: ${{ secrets.FIREFOX_JWT_SECRET }}
          FIREFOX_EXTENSION_ID: ${{ secrets.FIREFOX_EXTENSION_ID }}
        run: |
          if [ -n "${FIREFOX_JWT_ISSUER}" ] && [ -n "${FIREFOX_JWT_SECRET}" ] && [ -n "${FIREFOX_EXTENSION_ID}" ]; then
            echo "publish_enabled=true" >> "${GITHUB_OUTPUT}"
          else
            echo "publish_enabled=false" >> "${GITHUB_OUTPUT}"
            echo "::warning::Firefox AMO publishing skipped: one or more required secrets (FIREFOX_JWT_ISSUER, FIREFOX_JWT_SECRET, FIREFOX_EXTENSION_ID) are missing or empty."
          fi

      - name: Checkout repository
        if: steps.check_firefox_secrets.outputs.publish_enabled == 'true'
        uses: actions/checkout@v4

      - name: Download packaged artifacts
        if: steps.check_firefox_secrets.outputs.publish_enabled == 'true'
        uses: actions/download-artifact@v4
        with:
          path: /tmp/packaged-artifacts

      - name: Build Firefox source directory with gecko id
        if: steps.check_firefox_secrets.outputs.publish_enabled == 'true'
        env:
          FIREFOX_EXTENSION_ID: ${{ secrets.FIREFOX_EXTENSION_ID }}
        run: |
          rm -rf /tmp/firefox-src
          mkdir -p /tmp/firefox-src

          # Find the Firefox artifact (XPI file in jdVidCat-firefox directory)
          mapfile -t firefox_zip_candidates < <(find /tmp/packaged-artifacts -type f \( -iname '*.xpi' -o -iname '*firefox*.zip' \))
          if [ "${#firefox_zip_candidates[@]}" -ne 1 ]; then
            echo "Expected exactly one Firefox artifact, found ${#firefox_zip_candidates[@]}."
            find /tmp/packaged-artifacts -type f \( -name '*.zip' -o -name '*.xpi' \) -print
            exit 1
          fi

          unzip -q "${firefox_zip_candidates[0]}" -d /tmp/firefox-src

          # Inject Firefox-specific gecko ID into manifest
          python3 - <<'PY'
          import json, os
          path = "/tmp/firefox-src/manifest.json"
          with open(path, "r", encoding="utf-8") as f:
              manifest = json.load(f)
          manifest.setdefault("browser_specific_settings", {}).setdefault("gecko", {})["id"] = os.environ["FIREFOX_EXTENSION_ID"]
          with open(path, "w", encoding="utf-8") as f:
              json.dump(manifest, f, ensure_ascii=False, indent=2)
              f.write("\n")
          PY

      # NOTE: This step requires the extension to already be listed on AMO.
      # The first listing must be done manually via the AMO developer hub.
      # Subsequent releases can be automated with this workflow.
      - name: Submit signed build to Firefox Add-ons (AMO)
        if: steps.check_firefox_secrets.outputs.publish_enabled == 'true'
        run: |
          npm install --global web-ext@10.1.0
          # web-ext uses WEB_EXT_API_KEY and WEB_EXT_API_SECRET env vars by default
          WEB_EXT_API_KEY="${{ secrets.FIREFOX_JWT_ISSUER }}" \
          WEB_EXT_API_SECRET="${{ secrets.FIREFOX_JWT_SECRET }}" \
          web-ext sign \
            --source-dir /tmp/firefox-src \
            --artifacts-dir /tmp/firefox-artifacts \
            --channel listed \
            --no-input

