name: Condense AI Code Reviews

# Minimizes outdated review comments from known AI bots whenever they post a new review.
# Keeps only the most recent review per bot visible; older ones are collapsed with OUTDATED.
# Covers both formal PR reviews (Copilot) and issue comments (Gemini).

on:
  pull_request_review:
    types: [submitted]
  issue_comment:
    types: [created]

permissions:
  pull-requests: write
  issues: write

jobs:
  condense-reviews:
    name: Condense outdated AI reviews
    runs-on: ubuntu-latest
    # Run only when a known AI bot posts. For issue_comment, require it to be on a PR.
    if: |
      (
        github.event_name == 'pull_request_review' &&
        github.event.pull_request.head.repo.full_name == github.repository &&
        (
          github.event.review.user.login == 'copilot-pull-request-reviewer[bot]' ||
          github.event.review.user.login == 'gemini-code-assist[bot]'
        )
      ) ||
      (
        github.event_name == 'issue_comment' &&
        github.event.issue.pull_request.url != '' &&
        (
          github.event.comment.user.login == 'copilot-pull-request-reviewer[bot]' ||
          github.event.comment.user.login == 'gemini-code-assist[bot]'
        )
      )
    steps:
      - name: Minimize outdated AI review comments
        uses: actions/github-script@v7
        with:
          script: |
            const isReviewEvent = context.eventName === 'pull_request_review';
            const isCommentEvent = context.eventName === 'issue_comment';

            let botLogin, prNumber, latestReviewDatabaseId, latestIssueDatabaseId;

            if (isReviewEvent) {
              botLogin = context.payload.review.user.login;
              prNumber = context.payload.pull_request.number;
              latestReviewDatabaseId = context.payload.review.id;
            } else if (isCommentEvent) {
              botLogin = context.payload.comment.user.login;
              prNumber = context.payload.issue.number;
              latestIssueDatabaseId = context.payload.comment.id;
            } else {
              core.info('Unrecognized event; skipping.');
              return;
            }

            core.info(`Condensing ${botLogin} reviews on PR #${prNumber}`);

            // Fetch all reviews (with inline comments) and issue comments for the PR.
            // 100 entries is ample for a typical PR; pagination not needed here.
            const result = await github.graphql(`
              query($owner: String!, $repo: String!, $prNumber: Int!) {
                repository(owner: $owner, name: $repo) {
                  pullRequest(number: $prNumber) {
                    reviews(first: 100) {
                      nodes {
                        databaseId
                        submittedAt
                        author { login }
                        comments(first: 100) {
                          nodes {
                            id
                            isMinimized
                          }
                        }
                      }
                    }
                    comments(first: 100) {
                      nodes {
                        id
                        databaseId
                        isMinimized
                        createdAt
                        author { login }
                      }
                    }
                  }
                }
              }
            `, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              prNumber,
            });

            const pr = result?.repository?.pullRequest;

            // --- Minimize inline comments from older formal reviews ---
            const allBotReviews = (pr?.reviews?.nodes ?? [])
              .filter(r => r.author?.login === botLogin)
              .sort((a, b) => new Date(a.submittedAt) - new Date(b.submittedAt));

            // Identify the "current" review: prefer the one from the event, fall back to newest.
            const currentReview = isReviewEvent
              ? (allBotReviews.find(r => r.databaseId === latestReviewDatabaseId) ?? allBotReviews.at(-1))
              : allBotReviews.at(-1);

            let minimized = 0;
            for (const review of allBotReviews) {
              if (review === currentReview) continue;
              for (const comment of review.comments?.nodes ?? []) {
                if (comment.isMinimized) continue;
                try {
                  await github.graphql(`
                    mutation($id: ID!) {
                      minimizeComment(input: { subjectId: $id, classifier: OUTDATED }) {
                        minimizedComment { isMinimized }
                      }
                    }
                  `, { id: comment.id });
                  minimized++;
                } catch (err) {
                  core.warning(`Could not minimize review comment ${comment.id}: ${err.message}`);
                }
              }
            }

            // --- Minimize older issue/PR comments from this bot ---
            const allBotIssueComments = (pr?.comments?.nodes ?? [])
              .filter(c => c.author?.login === botLogin)
              .sort((a, b) => new Date(a.createdAt) - new Date(b.createdAt));

            const currentIssueComment = isCommentEvent
              ? (allBotIssueComments.find(c => c.databaseId === latestIssueDatabaseId) ?? allBotIssueComments.at(-1))
              : allBotIssueComments.at(-1);

            for (const comment of allBotIssueComments) {
              if (comment === currentIssueComment) continue;
              if (comment.isMinimized) continue;
              try {
                await github.graphql(`
                  mutation($id: ID!) {
                    minimizeComment(input: { subjectId: $id, classifier: OUTDATED }) {
                      minimizedComment { isMinimized }
                    }
                  }
                `, { id: comment.id });
                minimized++;
              } catch (err) {
                core.warning(`Could not minimize issue comment ${comment.id}: ${err.message}`);
              }
            }

            core.info(`Minimized ${minimized} outdated comment(s) from ${botLogin}.`);
