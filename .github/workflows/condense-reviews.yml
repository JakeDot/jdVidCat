name: Condense AI Code Reviews

on:
  pull_request_review:
    types: [submitted]
  issue_comment:
    types: [created]

jobs:
  condense:
    if: >
      (github.event_name == 'pull_request_review' &&
      (github.event.review.user.login == 'copilot-pull-request-reviewer[bot]' ||
      github.event.review.user.login == 'gemini-code-assist[bot]')) ||
      (github.event_name == 'issue_comment' &&
      github.event.issue.pull_request &&
      (github.event.comment.user.login == 'copilot-pull-request-reviewer[bot]' ||
      github.event.comment.user.login == 'gemini-code-assist[bot]'))
    # Pinned to @main as of 2026-05-20 (22bdfb21) — update when jd-ai-review-action releases a new version
    uses: JakeDot/jd-ai-review-action/.github/workflows/condense-reviews.yml@22bdfb21e757838a48ad628c40ac41d3232fe329
    permissions:
      pull-requests: write
      issues: write
