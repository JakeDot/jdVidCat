name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Prepare Pages content
        run: |
          set -e
          mkdir -p public
          cat > public/index.html <<'HTML'
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1" />
            <title>jdVidCat</title>
          </head>
          <body>
            <h1>jdVidCat</h1>
            <p>GitHub Pages deployment is configured successfully.</p>
          </body>
          </html>
          HTML
          echo "Content created successfully"

      - name: Validate Pages content
        run: |
          if [ ! -f public/index.html ]; then
            echo "Error: public/index.html was not created"
            exit 1
          fi
          if [ ! -s public/index.html ]; then
            echo "Error: public/index.html is empty"
            exit 1
          fi
          echo "Content validation passed"
          echo "Content size: $(wc -c < public/index.html) bytes"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
