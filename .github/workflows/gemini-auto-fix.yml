name: Gemini Auto-Fix

on:
  issue_comment:
    types: [created, edited]

jobs:
  auto-fix:
    if: >
      github.event.issue.pull_request != null &&
      github.event.comment.user.login == 'gemini-code-assist[bot]' &&
      github.event.comment.user.type == 'Bot' &&
      github.event.repository.full_name == github.repository
    # Pinned to @main as of 2026-05-20 (22bdfb21) — update when jd-ai-review-action releases a new version
    uses: JakeDot/jd-ai-review-action/.github/workflows/gemini-auto-fix.yml@22bdfb21e757838a48ad628c40ac41d3232fe329
    permissions:
      contents: write
      pull-requests: write
    with:
      allowed_path_pattern: '^(manifest\.json|background\.js|content\.js|popup\.js|popup\.html|icons\/[A-Za-z0-9._-]+)$'
