name: Gemini Auto-Fix

on:
  issue_comment:
    types: [created, edited]

jobs:
  auto-fix:
    uses: JakeDot/jd-ai-review-action/.github/workflows/gemini-auto-fix.yml@main
    permissions:
      contents: write
      pull-requests: write
    with:
      allowed_path_pattern: '^(manifest\.json|background\.js|content\.js|popup\.js|popup\.html|icons\/[A-Za-z0-9._-]+)$'

