<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>jdVidCat</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 13px;
      background: #1a1a2e;
      color: #e0e0e0;
      min-width: 380px;
      max-width: 480px;
    }

    header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 14px;
      background: #16213e;
      border-bottom: 1px solid #0f3460;
    }

    header img {
      width: 24px;
      height: 24px;
    }

    header h1 {
      font-size: 15px;
      font-weight: 600;
      color: #e94560;
      flex: 1;
    }

    header .badge {
      background: #e94560;
      color: #fff;
      border-radius: 10px;
      padding: 1px 7px;
      font-size: 11px;
      font-weight: 700;
      min-width: 20px;
      text-align: center;
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      background: #16213e;
      border-bottom: 1px solid #0f3460;
    }

    .toolbar button {
      padding: 4px 10px;
      border: 1px solid #0f3460;
      border-radius: 4px;
      background: #0f3460;
      color: #e0e0e0;
      cursor: pointer;
      font-size: 12px;
      transition: background 0.15s;
    }

    .toolbar button:hover {
      background: #e94560;
      border-color: #e94560;
    }

    .empty {
      padding: 28px 14px;
      text-align: center;
      color: #777;
      font-size: 12px;
    }

    .url-list {
      list-style: none;
      overflow-y: auto;
      max-height: 360px;
    }

    .url-list li {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 9px 14px;
      border-bottom: 1px solid #0f3460;
    }

    .url-list li:last-child {
      border-bottom: none;
    }

    .url-info {
      flex: 1;
      overflow: hidden;
    }

    .url-text {
      display: block;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-size: 11px;
      color: #a0c4ff;
      cursor: default;
    }

    .url-text:hover {
      color: #e94560;
    }

    .url-meta {
      font-size: 10px;
      color: #666;
      margin-top: 2px;
    }

    .send-btn {
      flex-shrink: 0;
      padding: 3px 8px;
      border: 1px solid #e94560;
      border-radius: 4px;
      background: transparent;
      color: #e94560;
      cursor: pointer;
      font-size: 11px;
      transition: background 0.15s, color 0.15s;
    }

    .send-btn:hover {
      background: #e94560;
      color: #fff;
    }

    .send-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .status-bar {
      padding: 4px 14px;
      background: #16213e;
      border-top: 1px solid #0f3460;
      font-size: 10px;
      color: #666;
      text-align: right;
    }
  </style>
</head>
<body>
  <header>
    <img src="icons/icon48.png" alt="jdVidCat icon" />
    <h1>jdVidCat</h1>
    <span class="badge" id="count">0</span>
  </header>

  <div class="toolbar">
    <button id="clearBtn">Clear list</button>
    <button id="sendAllBtn">Send all to JDownloader</button>
  </div>

  <ul class="url-list" id="urlList">
    <li class="empty" id="emptyMsg">No stream manifests detected yet.<br />Browse to a video page and jdVidCat will capture HLS/DASH URLs automatically.</li>
  </ul>

  <div class="status-bar" id="statusBar">Ready</div>

  <script src="popup.js"></script>
</body>
</html>
