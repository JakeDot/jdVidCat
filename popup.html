<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>jdCatVid</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 12px; width: 380px; background: #121212; color: #fff; }
    h1 { margin: 0 0 10px; font-size: 18px; display: flex; align-items: center; gap: 8px; }
    img { width: 18px; height: 18px; }
    label { display: block; font-size: 13px; margin-bottom: 4px; }
    input { width: 100%; box-sizing: border-box; padding: 7px; border-radius: 6px; border: 1px solid #444; margin-bottom: 8px; background: #1c1c1c; color: #fff; }
    button { width: 100%; border: none; padding: 9px; border-radius: 8px; cursor: pointer; background: linear-gradient(90deg, #ff3cac, #784ba0, #2b86c5); color: #fff; font-weight: bold; margin-bottom: 8px; }
    button:hover { opacity: 0.9; }
    button.secondary { background: #444; margin-bottom: 0; }
    button.secondary:hover { background: #555; }
    #status { margin-top: 10px; font-size: 12px; color: #ddd; min-height: 32px; }
    
    .tabs { display: flex; gap: 0; margin-bottom: 12px; border-bottom: 1px solid #333; }
    .tab-btn { flex: 1; padding: 8px; border: none; background: #1c1c1c; color: #888; cursor: pointer; border-bottom: 2px solid transparent; font-weight: bold; }
    .tab-btn.active { color: #fff; border-bottom-color: #2b86c5; background: #161616; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    
    #download-section { margin-bottom: 12px; }
    
    #history { max-height: 300px; overflow-y: auto; }
    .history-item { padding: 8px; background: #1c1c1c; margin-bottom: 6px; border-radius: 4px; border-left: 3px solid #2b86c5; font-size: 12px; }
    .history-item-title { font-weight: bold; margin-bottom: 2px; color: #fff; overflow-wrap: break-word; }
    .history-item-meta { color: #888; font-size: 11px; }
    .history-item-link { color: #2b86c5; text-decoration: none; cursor: pointer; margin-top: 4px; display: inline-block; margin-right: 12px; }
    .history-item-link:hover { text-decoration: underline; }
    .empty-history { text-align: center; color: #888; padding: 20px 10px; }
    
    .history-controls { margin-bottom: 10px; }
    .history-controls button { padding: 6px; font-size: 12px; }
  </style>
</head>
<body>
  <h1><img src="icons/jdcatvid.svg" alt="jdCatVid" />jdCatVid</h1>
  
  <div class="tabs">
    <button class="tab-btn active" data-tab="download">Download</button>
    <button class="tab-btn" data-tab="history">History</button>
  </div>
  
  <div id="download" class="tab-content active">
    <div id="download-section">
      <label for="maxDownloads">Max videos to download</label>
      <input id="maxDownloads" type="number" min="1" step="1" value="100" />
      <button id="startBtn">Download from this category/tag</button>
      <p id="status">Ready</p>
    </div>
  </div>
  
  <div id="history" class="tab-content">
    <div class="history-controls">
      <button id="clearHistoryBtn" class="secondary">Clear History</button>
    </div>
    <div id="historyList"></div>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
